    // --- STATE SYNC & LOAD ---
    function init() {
      const saved = localStorage.getItem('historia-7-progress-vanilla') || localStorage.getItem('historia-7-progress');
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          if (parsed && typeof parsed === 'object') {
            AppState.progress = { ...AppState.progress, ...parsed };
          }
        } catch (e) {
          console.error('Error loading progress:', e);
        }
      }
      
      const savedDark = localStorage.getItem('historia-7-dark');
      if (savedDark === 'true') {
        AppState.darkMode = true;
      } else if (savedDark === 'false') {
        AppState.darkMode = false;
      } else {
        AppState.darkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
      }
      
      // Keep state in memory as global app instance
      window.app = {
        addPoints: function(pts, reason) {
          AppState.progress.points += pts;
          saveProgress();
          triggerToast(pts, reason);
          render();
        },
        setTab: function(tab) {
          AppState.activeTab = tab;
          SPEECH.stop();
          render();
        },
        setThemeId: function(id) {
          AppState.activeThemeId = id;
          render();
        },
        toggleDarkMode: function() {
          AppState.darkMode = !AppState.darkMode;
          localStorage.setItem('historia-7-dark', AppState.darkMode);
          applyDarkModeStyles();
          render();
        },
        cycleFontSize: function() {
          const fontCycle = { 'normal': 'large', 'large': 'extra', 'extra': 'normal' };
          AppState.fontSize = fontCycle[AppState.fontSize] || 'normal';
          render();
        },
        submitWelcome: function() {
          const nameInput = document.getElementById('welcome-input-name');
          if (nameInput && nameInput.value.trim() !== '') {
            AppState.progress.name = nameInput.value.trim();
            this.addPoints(50, 'Registo oficial inaugural na caderneta escolar!');
          }
        },
        inputWelcomeKey: function(event) {
          if (event.key === 'Enter') {
            this.submitWelcome();
          }
        },
        saveSourceNote: function(sourceId, idx, text) {
          const key = `${sourceId}-${idx}`;
          AppState.progress.analyzedSourcesNotes[key] = text;
          saveProgress();
        },
        verifySourceAnswer: function(sourceId, idx) {
          const key = `${sourceId}-${idx}`;
          const currentText = AppState.progress.analyzedSourcesNotes[key] || '';
          if (currentText.trim() === '') return;

          AppState.progress.gameScores[`fontes-shown-${key}`] = 1;
          this.addPoints(100, `Interpretação e anotação histórica: ${sourceId === 'src-1' ? 'Gravuras' : 'Código de Leis'}`);
        },
        selectMiniQuizOption: function(quizId, chosenIdx, correctIdx, explanation) {
          const noteKey = `quiz-${quizId}-ans`;
          AppState.progress.gameScores[noteKey] = chosenIdx;
          
          if (chosenIdx === correctIdx) {
            this.addPoints(50, `Acertou na avaliação rápida de consolidação!`);
          } else {
            this.addPoints(10, `Participação na lição de consolidação rápida!`);
          }
        },
        selectMatchTerm: function(termId) {
          if (AppState.matchMatches.includes(termId)) return;
          AppState.matchSelectedTermId = termId;
          
          if (AppState.matchSelectedDefId) {
            this.evaluateMatch(termId, AppState.matchSelectedDefId);
          } else {
            render();
          }
        },
        selectMatchDef: function(defId) {
          if (AppState.matchMatches.includes(defId)) return;
          AppState.matchSelectedDefId = defId;
          
          if (AppState.matchSelectedTermId) {
            this.evaluateMatch(AppState.matchSelectedTermId, defId);
          } else {
            render();
          }
        },
        evaluateMatch: function(termId, defId) {
          if (termId === defId) {
            AppState.matchMatches.push(termId);
            this.addPoints(40, 'Associação de termos históricos correta!');
          } else {
            // Temporary error flash logic
            triggerToast(0, 'Tentativa de associação incorreta, tenta outra vez!');
          }
          AppState.matchSelectedTermId = null;
          AppState.matchSelectedDefId = null;
          render();
        },
        checkEscapeRoomAnswer: function() {
          const input = document.getElementById('escape-room-input');
          if (!input) return;
          const userAns = input.value.trim().toLowerCase();
          
          if (userAns.includes('mamede') || userAns.includes('são mamede') || userAns.includes('sao mamede')) {
            AppState.progress.gameScores['escape-room-solved'] = 1;
            this.addPoints(150, 'Escapou com brilhantismo da masmorra heróica de Guimarães de 1128!');
          } else {
            this.addPoints(10, 'Introduziu um palpite de chave incorreto no trinco!');
          }

            AppState.matchSelectedDefId = null;
            
            saveProgress();
            render();
          }
        }
      };

      applyDarkModeStyles();
      render();
    }

    function saveProgress() {

    function applyDarkModeStyles() {
      const root = document.documentElement;
      if (AppState.darkMode) {
        root.classList.add('dark');
        document.body.classList.add('dark', 'bg-slate-950', 'text-slate-100');
        document.body.classList.remove('bg-gray-50', 'text-gray-800');
      } else {
        root.classList.remove('dark');
        document.body.classList.remove('dark', 'bg-slate-950', 'text-slate-100');
        document.body.classList.add('bg-gray-50', 'text-gray-800');
      }
    }

    // --- FLOATING XP TOAST GENERATOR ---
    function triggerToast(pts, reason) {
      const toastContainer = document.getElementById('toast-container');
      if (!toastContainer) return;

      const toast = document.createElement('div');
      toast.className = `p-4 rounded-2xl shadow-2xl border flex items-center justify-between gap-4 pointer-events-auto fade-in transition-all duration-300 transform translate-y-10 opacity-0 ${
        AppState.darkMode 
          ? 'bg-indigo-950 border-indigo-500/30 text-white' 
          : 'bg-white border-indigo-200 text-gray-800'
      }`;
      
      toast.innerHTML = `
        <div class="space-y-0.5 text-left">
          <span class="text-[9px] uppercase font-bold tracking-widest text-indigo-500 font-mono">Aproveitamento Académico</span>
          <p class="text-xs font-semibold leading-snug">${reason}</p>
        </div>
        <span class="shrink-0 bg-indigo-600 text-white font-mono font-black text-xs px-2.5 py-1.5 rounded-xl uppercase tracking-wider">
          +${pts} XP
        </span>
      `;

      toastContainer.appendChild(toast);
      
      // Trigger animation
      setTimeout(() => {
        toast.style.transform = 'translateY(0)';
        toast.style.opacity = '1';
      }, 50);

      // Dismiss after 4s
      setTimeout(() => {
        toast.style.transform = 'translateY(20px)';
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

                    <i data-lucide="file-text" class="w-4 h-4"></i> Oficina de Fontes
                  </button>
                  <button
                    onclick="app.setTab('jogos')"
                    class="w-full p-3 rounded-xl text-left text-xs font-bold flex items-center gap-3 transition-all ${
                      AppState.activeTab === 'jogos' 
                        ? 'bg-indigo-600 text-white shadow-md font-extrabold translate-x-1' 
                        : 'text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-800/80'
                    }"
                  >
                    <i data-lucide="trophy" class="w-4 h-4"></i> Arena de Desafios
                  </button>
                  <button
                    onclick="app.setTab('final')"
                    class="w-full p-3 rounded-xl text-left text-xs font-bold flex items-center gap-3 transition-all ${
                      AppState.activeTab === 'final' 
                        ? 'bg-indigo-600 text-white shadow-md font-extrabold translate-x-1' 
                        : 'text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-800/80'
                    }"
                  >
                    <i data-lucide="award" class="w-4 h-4"></i> Avaliação Final
                  </button>
                  <button
                    onclick="app.setTab('progresso')"
                    class="w-full p-3 rounded-xl text-left text-xs font-bold flex items-center gap-3 transition-all ${
                      AppState.activeTab === 'progresso' 
                        ? 'bg-indigo-600 text-white shadow-md font-extrabold translate-x-1' 
                        : 'text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-800/80'
                    }"
                  >
                    <i data-lucide="star" class="w-4 h-4"></i> O Teu Progresso
                  </button>
                </nav>
              </div>

              <!-- Docente Advice Card signature from design guidelines -->
              <div class="p-5 rounded-3xl border border-dashed text-xs space-y-2.5 text-left ${
                AppState.darkMode ? 'bg-slate-900 border-slate-800' : 'bg-indigo-50/40 border-indigo-200'
              }">
                <div class="flex items-center gap-2">
                  <span class="text-xl">👩‍🏫</span>
                  <strong class="text-indigo-600 dark:text-indigo-400 font-display">Conselhos da Professora</strong>
                </div>
                <p class="text-gray-500 italic leading-relaxed">
                  "Todo este portal está alinhado com as **Aprendizagens Essenciais** do 7.º ano de História nacional. Completa as tarefas e recolhe os teus prémios virtuais!"
                </p>
                <div class="pt-0.5 flex items-center gap-1.5 text-[10px] uppercase font-bold text-green-600 font-mono">
                  <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-ping"></span>
                  <span>Sessão de Estudos Ativa</span>
                </div>
              </div>
            </div>

            <!-- RIGHT WORKSPACE: Dynamic content block loader based on tab (Col Span 9) -->
            <main class="lg:col-span-9 space-y-6">
              ${viewMarkup}
            </main>
          </div>

          <!-- GLOBAL COMPACT FOOTER -->
          <footer class="border-t py-6 mt-16 px-4 text-center text-xs dark:text-slate-400 no-print ${
            AppState.darkMode ? 'bg-slate-900 border-slate-800 text-gray-400' : 'bg-white border-gray-200 text-gray-500'
          }">
            <p>História do 7.º Ano de Escolaridade • Disciplina sob direcção virtual da Profª Carla Oliveira</p>
            <p class="text-[10px] font-mono tracking-wide text-gray-400 mt-1 uppercase">
              Concebido em conformidade com as Aprendizagens Essenciais Curriculares Nacionais • Autónoma GitHub Pages
            </p>
          </footer>

        </div>
      `;

      rootDiv.innerHTML = mainAppMarkup;

      // Run Lucide update immediately to create vector icons dynamically on the compiled HTML markup
      if (window.lucide) {
        window.lucide.createIcons();
      }
    }

    // --- ON CONSOLE MOUNT START ---
    window.addEventListener('DOMContentLoaded', () => {
      init();
    });
  </script>
</body>
</html>
