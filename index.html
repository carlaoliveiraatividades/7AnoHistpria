                        }
                      };

                      return (
                        <div className="space-y-4">
                          <div className="p-5 bg-emerald-500/5 rounded-2xl border border-dashed border-emerald-200 text-center space-y-3">
                            <span className="text-4xl">🗝️</span>
                            <p className="font-serif italic text-xs sm:text-sm text-gray-700 dark:text-gray-300">
                              «O jovem herdeiro rebelde D. Afonso Henriques lutou contra o exército leonez de sua própria mãe e do conde galego em Guimarães, no ano de 1128, marcando o prelúdio da realeza. Em que célebre BATALHA militar triunfou o infante?»
                            </p>
                          </div>

                          {!correct ? (
                            <div className="space-y-3 max-w-sm mx-auto">
                              <input
                                type="text"
                                value={ans}
                                onChange={(e) => setAns(e.target.value)}
                                placeholder="Batalha de Sã..."
                                className={`w-full p-3 rounded-xl border text-center text-xs sm:text-sm outline-none ${darkMode ? 'bg-slate-800 border-slate-700 text-white focus:border-indigo-500' : 'bg-gray-50 border-gray-300 text-gray-800 focus:border-indigo-500'}`}
                              />
                              <button
                                onClick={checkAns}
                                className="w-full py-2.5 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-semibold font-display text-xs"
                              >
                                Experimentar Chave de Prata
                              </button>
                            </div>
                          ) : (
                            <div className="p-4 rounded-xl bg-green-500/10 text-xs text-center text-green-700 space-y-2">
                              <p className="font-extrabold">🎉 Enigma Sólido Resolvido! Chave Desbloqueada.</p>
                              <p className="italic">«A Batalha de São Mamede foi o verdadeiro prelúdio de soberania territorial de Portugal luso.»</p>
                            </div>
                          )}
                        </div>
                      );
                    })()}
                  </div>
                </div>
              )}

              {/* 6. VIEW: FINAL COMPREHENSIVE QUIZ */}
              {activeTab === 'final' && (
                <div className="space-y-6">
                  <div className={`p-6 rounded-3xl border ${darkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-gray-200'}`}>
                    <h2 className="font-display font-black text-slate-800 dark:text-slate-100 text-xl tracking-tight">
                      🏆 Avaliação Final Integradora Currículo
                    </h2>
                    <p className="text-xs text-gray-400 mt-1">
                      Testa os teus conhecimentos em todo o programa de História do 7.º ano. Supera 70% de sucesso para imprimires o teu Certificado assinado virtualmente pela Professora Carla Oliveira!
                    </p>
                  </div>

                  {(() => {
                    const finalQuestions = [
                      { q: 'O nomadismo do Paleolítico significava:', opts: ['Ter habitação fixa.', 'Deslocar-se constantemente em busca de alimentos.', 'Votar democraticamente nas cortes.', 'Construir grandes menires funerários.'], cIdx: 1, exp: 'Os bandos dependiam exclusivamente dos recursos naturais.' },
                      { q: 'Que importante Édito de 313 d.C. declarou a liberdade religiosa para cristãos em Roma?', opts: ['Édito de Tessalónica.', 'Tratado de Zamora.', 'Édito de Milão.', 'Código de César.'], cIdx: 2, exp: 'O Édito de Milão de Constantino pôs fim às perseguições.' },
                      { q: 'Quem foi coroado o primeiro rei legítimo de Portugal na dinastia Borgonha?', opts: ['Conde D. Henrique.', 'D. Afonso Henriques.', 'D. Dinis o Poeta.', 'D. Fernando V.'], cIdx: 1, exp: 'Reconhecido rei em Zamora (1143) e pelo Papa (1179).' },
                      { q: 'A Batalha de Aljubarrota em 1385 garantiu:', opts: ['A união territorial direta com Castela.', 'A integridade da soberania nacional do reino.', 'O início imediato do nomadismo arcaico.', 'O pagamento de dízimos à arquidiocese.'], cIdx: 1, exp: 'Evitou a anexação política e consolidou a dinastia de Avis.' }
                    ];

                    const [answers, setAnswers] = useState({});
                    const [submitted, setSubmitted] = useState(false);

                    const score = useMemo(() => {
                      let correctCount = 0;
                      finalQuestions.forEach((q, idx) => {
                        if (answers[idx] === q.cIdx) correctCount++;
                      });
                      return Math.round((correctCount / finalQuestions.length) * 100);
                    }, [answers]);

                    return (
                      <div className="space-y-6">
                        {!submitted ? (
                          <div className={`p-6 rounded-3xl border space-y-6 ${darkMode ? 'bg-slate-902 border-slate-800' : 'bg-white border-gray-200'}`}>
                            {finalQuestions.map((q, idx) => (
                              <div key={idx} className="space-y-2.5">
                                <p className="font-semibold text-xs sm:text-sm text-gray-800 dark:text-white">{idx+1}. {q.q}</p>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                  {q.opts.map((opt, oidx) => {
                                    const isSelected = answers[idx] === oidx;
                                    return (
                                      <button
                                        key={oidx}
                                        type="button"
                                        onClick={() => setAnswers(prev => ({ ...prev, [idx]: oidx }))}
                                        className={`p-3 rounded-xl border text-left text-xs font-semibold transition-all ${isSelected ? 'border-indigo-600 bg-indigo-650/15' : 'border-gray-200'}`}
                                      >
                                        {opt}
                                      </button>
                                    );
                                  })}
                                </div>
                              </div>
                            ))}

                            <button
                              onClick={() => {
                                setSubmitted(true);
                                setProgress(prev => ({
                                  ...prev,
                                  completedFinalQuiz: true,
                                  finalQuizScore: score
                                }));
                                addPoints(200, 'Submeteu a Avaliação Integradora Final!');
                              }}
                              disabled={Object.keys(answers).length < finalQuestions.length}
                              className="w-full py-3 bg-indigo-650 hover:bg-indigo-755 disabled:opacity-40 text-white font-semibold font-display text-xs rounded-xl shadow transition-all uppercase tracking-wider"
                            >
                              Submeter Exame Final de História
                            </button>
                          </div>
                        ) : (
                          <div className="space-y-6">
                            <div className={`p-6 rounded-3xl border text-center space-y-4 ${darkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-gray-200'}`}>
                              <span className="text-5xl">🏆</span>
                              <h3 className="font-display font-black text-xl text-indigo-600">Exame Concluído!</h3>
                              <p className="text-sm font-semibold">Tiveste uma taxa de sucesso de <strong>{score}%</strong>.</p>
                              
                              {score >= 70 ? (
                                <div className="space-y-4">
                                  <p className="text-xs text-green-600 font-bold">Parabéns! Passaste no teste da professa Carla Oliveira com sucesso.</p>
                                  
                                  {/* PRINT CERTIFICATE CARD */}
                                  <div 
                                    id="print-certificate"
                                    className="p-8 border-8 border-double border-gray-300 dark:border-slate-850 rounded-2xl max-w-xl mx-auto space-y-6 bg-white text-gray-800 shadow-md relative"
                                  >
                                    <div className="text-center space-y-1">
                                      <span className="text-4xl">📜</span>
                                      <h1 className="font-display font-black text-lg sm:text-2xl tracking-tight text-gray-800">DIPLOMA DE HISTORIADOR</h1>
                                      <p className="text-[10px] font-mono tracking-widest text-gray-400">7.º ANO DE ESCOLARIDADE • APRENDIZAGENS ESSENCIAIS</p>
                                    </div>
                                    <div className="space-y-3 font-serif">
                                      <p className="text-xs text-center leading-relaxed">
                                        Declara-se solenemente que o aluno(a) de excelência artística e científica
                                      </p>
                                      <h2 className="text-center font-display font-black text-xl border-b-2 border-dashed border-gray-300 pb-1 text-indigo-600">{progress.name || 'Aluno'}</h2>
                                      <p className="text-xs text-center leading-relaxed">
                                        completou com aproveitamento notável de <strong>{score}%</strong> a avaliação final, demonstrando pleno conhecimento da evolução humana, economia recoletora, império romano e fundação da nacionalidade de Portugal.
                                      </p>
                                    </div>
                                    <div className="flex justify-between items-end border-t border-gray-100 pt-5 text-left text-[11px]">
                                      <div>
                                        <p className="font-bold">Profª Carla Oliveira</p>
                                        <p className="text-gray-400 font-mono">Assinatura Digital</p>
                                      </div>
                                      <div className="text-right">
                                        <p className="font-mono">Ponto {progress.points} XP</p>
                                        <p className="text-gray-400 font-mono">Validação Automática</p>
                                      </div>
                                    </div>
                                  </div>

                                  <button
                                    onClick={() => window.print()}
                                    className="px-5 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold flex items-center gap-1.5 mx-auto text-xs no-print"
                                  >
                                    Imprimir Diploma Curricular
                                  </button>
                                </div>
                              ) : (
                                <div className="space-y-3">
                                  <p className="text-xs text-red-600 font-bold">Infelizmente não alcançaste o patamar mínimo de 70% para o diploma.</p>
                                  <button
                                    onClick={() => {
                                      setSubmitted(false);
                                      setAnswers({});
                                    }}
                                    className="px-5 py-2 rounded-xl bg-gray-200 dark:bg-slate-800 text-xs font-semibold"
                                  >
                                    Tentar Novamente
                                  </button>
                                </div>
                              )}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })()}
                </div>
              )}

              {/* 7. VIEW: TEU PROGRESSO */}
              {activeTab === 'progresso' && (
                <div className="space-y-6">
                  <div className={`p-6 rounded-3xl border ${darkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-gray-200'}`}>
                    <h2 className="font-display font-black text-slate-800 dark:text-slate-100 text-xl tracking-tight">
                      🏆 Caderneta Escolar Digital de Progresso
                    </h2>
                    <p className="text-xs text-gray-400 mt-1">
                      Acompanha os teus pontos de Erudição, o teu nível e vê as tuas medalhas digitais desbloqueadas de acordo com as metas curriculares atingidas.
                    </p>
                  </div>

                  {/* Badges Box Grid */}
                  <div className="space-y-4">
                    <h3 className="font-display font-bold text-xs uppercase tracking-wider text-indigo-500">
                      🏅 Medalhas e Conquistas de Erudição Histórica
                    </h3>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                      {BADGES.map((badge) => {
                        const isUnlocked = progress.points >= badge.unlockedAtPoints;
                        return (
                          <div 
                            key={badge.id}
                            className={`p-5 rounded-3xl border flex items-center gap-4 transition-all ${isUnlocked ? badge.className : 'opacity-40 bg-gray-100 dark:bg-slate-805 border-gray-200'}`}
                          >
                            <span className="text-4xl shrink-0">{badge.icon}</span>
                            <div>
                              <h4 className="font-display font-extrabold text-sm leading-tight text-gray-800 dark:text-white">{badge.title}</h4>
                              <p className="text-[10px] text-gray-500 mt-1 leading-snug">{badge.description}</p>
                              <span className="text-[9px] font-mono font-bold uppercase mt-1 block">
                                {isUnlocked ? '✓ Desbloqueada' : `Meta: ${badge.unlockedAtPoints} XP`}
                              </span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
              )}

            </main>
          </div>

          {/* GLOBAL IN-PREVIEW FOOTER */}
          <footer className={`border-t py-6 mt-16 px-4 text-center text-xs dark:text-slate-400 ${darkMode ? 'bg-slate-900 border-slate-800 text-gray-400' : 'bg-white border-gray-200 text-gray-500'}`}>
            <p>História do 7.º Ano de Escolaridade • Disciplina sob direcção da Profª Carla Oliveira</p>
            <p className="text-[10px] font-mono tracking-wide text-gray-400 mt-1">Concebido de acordo com as Aprendizagens Essenciais Curriculares Nacionais • Autónoma GitHub Pages</p>
          </footer>

        </div>
      );
    }

    // --- RENDER APP IN PREVIEW ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
